name: Build Hook EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Build portable Hook EXE
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-local-hook-exe.ps1 -OutputDir "release\Hook\portable" -Force

      - name: Upload portable Hook EXE artifact
        uses: actions/upload-artifact@v6
        with:
          name: hook-portable-windows-x64
          path: release/Hook/portable/hook.exe
          if-no-files-found: error
